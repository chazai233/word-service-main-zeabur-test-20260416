        - edition_type: basic
          id: e3bb16e0-8bee-447c-a406-e4a3be6bdcf4
          role: system
          text: 你是一个专业的施工日报解析助手，负责从杂乱的日报文本中提取结构化施工信息。
        - edition_type: basic
          id: 7677d9cd-f100-4173-b11d-58ae6f67203a
          role: user
          text: "请从以下施工日报中提取当日施工信息。\n\n## 提取规则：\n1. **提取当日或前一日完成和夜班完成的施工内容**\n2. **每个施工活动单独一行**，不要合并多个活动到一行\n3. **必须忽略以下内容**：\n   - 设备名称（挖机、自卸车、装载机等）\n   - 人员配置（普工、驾驶员等）\n   - 累计工作量\n   - 盲沟相关内容\n4. 施工部位必须映射到以下标准名称之一：\n   - 右岸道路\n   - 炸药库\n   - 右岸砂石骨料加工系统\n   - 右岸拌合系统\n   - 右岸1#弃渣场\n   - 右岸2#弃渣场\n   - 左岸1#弃渣场\n   - 左岸2#弃渣场\n   - 右岸坝肩\n   - 右岸基坑\n   - 右岸施工营地\n   - 左岸EPC营地\n   - 左岸业主营地\n5. “右岸拌合系统”需要包含120/180/240拌合站相关内容；“右岸基坑”指引航道区域。\n6. **如果无法匹配，保留原始施工部位名称**。\n7. 施工内容要简洁，保留高程信息如\"(EL.480)\"。\n8. 班次信息放入shift字段，可以是\"白班\"、\"夜班\"或空。\n9. 日完成量保留原文“数字+单位”格式，不做单位猜测，不改写单位。\n10. 忽略标注为\"未开工\"或\"未施工\"的项目。\n\n## 输出格式（严格JSON数组）：\n[\n  {\n    \"location\": \"施工部位（13选1）\",\n    \"content\": \"施工内容（简洁，可含高程）\",\n    \"quantity\": \"日完成量\",\n    \"shift\": \"白班/夜班/空\"\n  }\n]\n\n## 示例：\n[\n  {\"location\": \"右岸道路\", \"content\": \"R2道路K2+300-K2+500段路基开挖平整碾压完成\", \"quantity\": \"1项\", \"shift\": \"\"},\n  {\"location\": \"右岸拌合系统\", \"content\": \"2#240拌合楼基础柱钢筋绑扎\", \"quantity\": \"1项\", \"shift\": \"\"},\n  {\"location\": \"右岸基坑\", \"content\": \"引航道区域边坡清表\", \"quantity\": \"300m²\", \"shift\": \"夜班\"}\n]\n\n## 用户日报：\n{{#1765618047622.daily_report#}}"
        selected: false
