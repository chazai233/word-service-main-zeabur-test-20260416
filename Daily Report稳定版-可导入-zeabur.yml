    - data:
        code: "import json\nimport base64\ndef main(sorted_data: str, translation_output: str) -> dict:\n    \"\"\"?? Word ?????????? base64?\"\"\"\n    try:\n        data = json.loads(sorted_data) if sorted_data else []\n    except Exception:\n        data = []\n\n    if not isinstance(data, list):\n        data = []\n\n    daily_stats = []\n    for item in data:\n        if not isinstance(item, dict):\n            continue\n        daily_stats.append({\n            \"seq\": str(item.get(\"seq\", \"\")).strip(),\n            \"location\": str(item.get(\"location\", \"\")).strip(),\n            \"content\": str(item.get(\"content\", \"\")).strip(),\n            \"quantity\": str(item.get(\"quantity\", \"\")).strip(),\n            \"remarks\": str(item.get(\"shift\", \"\")).strip()\n        })\n\n    daily_stats_json = json.dumps(daily_stats, ensure_ascii=False)\n    daily_stats_b64 = base64.b64encode(daily_stats_json.encode(\"utf-8\")).decode(\"utf-8\")\n    text = str(translation_output) if translation_output is not None else \"\"\n\n    return {\n        \"request_body\": json.dumps({\n            \"daily_stats_base64\": daily_stats_b64,\n            \"chinese_data\": sorted_data if sorted_data else \"[]\",\n            \"english_data\": text,\n            \"cn_template_base64\": \"\"\
          ,\n            \"en_template_base64\": \"\"\
          \n        }, ensure_ascii=False)\n    }\n"
