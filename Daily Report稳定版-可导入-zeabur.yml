    - data:
        code: "import json\nimport re\n\ndef main(llm_output: str) -> dict:\n    \"\"\"验证并规范化LLM输出\"\"\"\n    \n    if isinstance(llm_output, dict):\n        llm_output = json.dumps(llm_output, ensure_ascii=False)\n    \n    try:\n        data = json.loads(llm_output)\n    except:\n        match = re.search(r'\\[[\\s\\S]*\\]', str(llm_output))\n        if match:\n            try:\n                data = json.loads(match.group())\n            except:\n                return {\"data\": \"[]\", \"count\": 0}\n        else:\n            return {\"data\": \"[]\", \"count\": 0}\n    \n    if not isinstance(data, list):\n        return {\"data\": \"[]\", \"count\": 0}\n    \n    validated = []\n    for item in data:\n        if not isinstance(item, dict):\n            continue\n        \n        location = str(item.get(\"location\", \"\")).strip()\n        content = str(item.get(\"content\", \"\")).strip()\n        \n        if not location or not content:\n            continue\n        if \"盲沟\" in content:\n            continue\n        \n        validated.append({\n            \"location\": location,\n            \"content\": content,\n            \"quantity\": str(item.get(\"quantity\", \"\")).strip() or \"—\",\n            \"shift\": str(item.get(\"shift\", \"\")).strip()\n        })\n    \n    return {\"data\": json.dumps(validated, ensure_ascii=False), \"count\": len(validated)}"
