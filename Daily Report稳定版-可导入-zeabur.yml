        code: "import json\n\ndef main(query: str) -> dict:\n    \"\"\"从输入句子中提取匹配的术语 - 改进版\"\"\"\n    \n    # 完整术语表 (扩展版 - 新增电力工程相关术语)\n    GLOSSARY = {\n        # 项目与位置\n        \"北本水电站\": \"Pak Beng Hydropower Project\",\n        \"右岸道路\": \"Right Bank Road\",\n        \"R10道路\": \"R10 Road\",\n        \"右岸沿线道路\": \"Roads along the right bank\",\n        \"右岸坝肩\": \"Right Bank Abutment\",\n        \"砂石骨料加工系统\": \"Right Bank Aggregate Plant\",\n        \"砂石系统\": \"Aggregate System\",\n        \"采石场\": \"Right Bank Quarry\",\n        \"2#弃渣场\": \"2# Spoil Area\",\n        \"1#弃渣场\": \"1# Spoil Area\",\n        \"炸药库\": \"Explosives Magazine\",\n        \"硝铵炸药库房\": \"Ammonium Nitrate Magazine\",\n        \"乳化炸药库房\": \"Emulsion Explosives Magazine\",\n        \"雷管库房\": \"Detonator Magazine\",\n        \"右岸临时120拌合站\": \"Right Bank Temporary Batching Plant 120 (m³/h)\",\n        \"右岸拌合系统\": \"Right Bank Batching System\",\n        \"混凝土系统\": \"Concrete Batching System\",\n        \"预制梁场\": \"Precasting Yard\",\n        \"制砖厂\": \"Brick Plant\",\n        \"钢筋加工厂\": \"Reinforcement Plant\",\n        \"观景台\": \"Viewing Platform\",\n        \"卸料平台\": \"Discharge Platform\",\n        \"受料平台\": \"Receiving Platform\",\n        \"控制室\": \"Control Room\",\n        \"发电机房\": \"Generator Room\",\n        \"地磅\": \"Weighbridge\",\n        \"施工营地\": \"Construction Camp\",\n        \"右岸\": \"Right Bank\",\n        \n        # 道路相关\n        \"道路路面整平\": \"Road Surface Grading\",\n        \"路面整平\": \"Road Surface Grading\",\n        \"道路平整\": \"Road Grading\",\n        \"道路碾压\": \"Road Compaction\",\n        \"路堤塑型\": \"Embankment Plasticity Treatment\",\n        \"日常道路维护\": \"Routine Road Maintenance\",\n        \"道路扩挖\": \"Road Widening\",\n        \"道路回填\": \"Road Backfill\",\n        \"毛路开挖\": \"Rough Road Excavation\",\n        \"砂石系统至采石场道路\": \"Road from Aggregate System to Right Bank Quarry\",\n        \n        # 土石方工程\n        \"清表\": \"Clearing and Grubbing\",\n        \"植被清理