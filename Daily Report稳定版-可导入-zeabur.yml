    - data:
        code: "import json\nimport re\n\ndef main(validated_data: str) -> dict:\n    \"\"\"按13个标准施工部位固定顺序排序\"\"\"\n\n    try:\n        data = json.loads(validated_data)\n    except Exception:\n        data = []\n\n    if not isinstance(data, list):\n        data = []\n\n    locations = [\n        (\"右岸道路\", \"Right Bank Roads\"),\n        (\"炸药库\", \"Explosives Magazine\"),\n        (\"右岸砂石骨料加工系统\", \"Right Bank Aggregate System\"),\n        (\"右岸拌合系统\", \"Right Bank Batching System\"),\n        (\"右岸1#弃渣场\", \"Right Bank 1# Spoil Area\"),\n        (\"右岸2#弃渣场\", \"Right Bank 2# Spoil Area\"),\n        (\"左岸1#弃渣场\", \"Left Bank 1# Spoil Area\"),\n        (\"左岸2#弃渣场\", \"Left Bank 2# Spoil Area\"),\n        (\"右岸坝肩\", \"Right Bank Abutment\"),\n        (\"右岸基坑\", \"Right Bank Foundation Pit\"),\n        (\"右岸施工营地\", \"Right Bank Construction Camp\"),\n        (\"左岸EPC营地\", \"Left Bank EPC Camp\"),\n        (\"左岸业主营地\", \"Left Bank Employer Camp\"),\n    ]\n\n    loc_order = {loc[0]: i for i, loc in enumerate(locations)}\n    loc_en = {loc[0]: loc[1] for loc in locations}\n\n    def compact(text):\n        value = str(text or \"\").strip().lower()\n        value = value.replace(\"（\", \"(\").replace(\"）\", \")\")\n        return re.sub(r\"\\s+\", \"\", value)\n\n    alias_map = {\n        \"右岸道路\": [\n            \"右岸道路\", \"右岸沿线道路\", \"r2道路\", \"r2路\", \"r10道路\", \"r10路\", \"r10至2#弃渣场道路\"\n        ],\n        \"炸药库\": [\n            \"炸药库\", \"硝铵炸药库\", \"乳化炸药库\", \"雷管库\"\n        ],\n        \"右岸砂石骨料加工系统\": [\n            \"右岸砂石骨料加工系统\", \"砂石骨料加工系统\", \"砂石系统\", \"骨料系统\", \"粗碎车间\", \"中碎车间\", \"制砂系统\"\n        ],\n        \"右岸拌合系统\": [\n            \"右岸拌合系统\", \"120拌合站\", \"180拌合站\", \"240拌合站\", \"120拌合楼\", \"180拌合楼\", \"240拌合楼\", \"2#240\"\n        ],\n        \"右岸1#弃渣场\": [\"右岸1#弃渣场\", \"右岸1号弃渣场\", \"右岸一号弃渣场\"],\n        \"右岸2#弃渣场\": [\"右岸2#弃渣场\", \"右岸2号弃渣场\", \"右岸二号弃渣场\", \"r10至2#弃渣场\"],\n        \"左岸1#弃渣场\": [\"左岸1#弃渣场\", \"左岸1号弃渣场\", \"左岸一号弃渣场\"],\n        \"左岸2#弃渣场\": [\"左岸2#弃渣场\", \"左岸2号弃渣场\", \"左岸二号弃渣场\"],\n        \"右岸坝肩\": [\"右岸坝肩\"],\n        \"右岸基坑\": [\"右岸基坑\", \"右岸引航道\", \"引航道区域\", \"引航道\"],\n        \"右岸施工营地\": [\"右岸施工营地\", \"右岸营地\"],\n        \"左岸EPC营地\": [\"左岸epc营地\", \"epc营地\"],\n        \"左岸业主营地\": [\"左岸业主营地\", \"业主营地\"],\n    }\n\n    alias_map = {k: [compact(x) for x in v] for k, v in alias_map.items()}\n\n    def normalize_location(raw_location):\n        raw = str(raw_location or \"\").strip()\n        if not raw:\n            return \"\"\n\n        normalized = compact(raw)\n\n        for std in loc_order:\n            if normalized == compact(std):\n                return std\n\n        for std, aliases in alias_map.items():\n            if any(alias and alias in normalized for alias in aliases):\n                return std\n\n        if \"弃渣场\" in normalized:\n            side = \"左岸\" if \"左岸\" in normalized else \"右岸\" if \"右岸\" in normalized else \"\"\n            if side:\n                if any(x in normalized for x in (\"1#\", \"1号\", \"一号\", \"一#\")):\n                    return f\"{side}1#弃渣场\"\n                if any(x in normalized for x in (\"2#\", \"2号\", \"二号\", \"二#\")):\n                    return f\"{side}2#弃渣场\"\n\n        if \"拌合\" in normalized and (\"右岸\" in normalized or any(x in normalized for x in (\"120\", \"180\", \"240\"))):\n            return \"右岸拌合系统\"\n\n        if \"道路\" in normalized and (\"右岸\" in normalized or re.search(r\"r\\d+\", normalized)):\n            return \"右岸道路\"\n\n        if \"引航道\" in normalized and \"右岸\" in normalized:\n            return \"右岸基坑\"\n\n        return raw\n\n    normalized_data = []\n    for item in data:\n        if not isinstance(item, dict):\n            continue\n        normalized_data.append({\n            \"location\": normalize_location(item.get(\"location\", \"\")),\n            \"content\": str(item.get(\"content\", \"\")).strip(),\n            \"quantity\": str(item.get(\"quantity\", \"\")).strip(),\n            \"shift\": str(item.get(\"shift\", \"\")).strip(),\n        })\n\n    sorted_data = sorted(normalized_data, key=lambda\
          \ x: loc_order.get(x.get(\"location\", \"\"), 99))\n\n    result = []\n    current_loc = None\n    seq = 0\n\n    for item in sorted_data:\n        location = item.get(\"location\", \"\")\n        if location != current_loc:\n            seq += 1\n            current_loc = location\n\n        result.append({\n            \"seq\": seq,\n            \"location\": location,\n            \"location_en\": loc_en.get(location, location),\n            \"content\": item.get(\"content\", \"\"),\n            \"quantity\": item.get(\"quantity\", \"\"),\n            \"shift\": item.get(\"shift\", \"\"),\n        })\n\n    return {\n        \"sorted_data\": json.dumps(result, ensure_ascii=False),\n        \"count\": len(result)\n    }\n"
        code_language: python3
